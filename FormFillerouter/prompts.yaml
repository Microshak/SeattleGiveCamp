# =============================================================================
# Seattle GiveCamp — LLM Prompts for Form Filling
# Auto-generated from mikeTODO.md on 2026-06-06
# =============================================================================
#
# These prompts are sent to the local LLM (Qwen3.5-35B via llama.cpp at
# localhost:8080/v1). The LLM receives the HTML of a form and returns JSON
# instructing the Playwright engine which fields to fill and with what values.
# =============================================================================

# ── System prompt: field analysis ───────────────────────────────────────
# Sent once at the start of a conversation with the LLM.
system: |
  You are an automated form-filling assistant for Seattle GiveCamp, a 501(c)(3) nonprofit
  that connects volunteer technologists with local charities for weekend hackathons.

  Your job: given the HTML of a web form (sponsorship, partnership, donation, or contact),
  identify every fillable field and determine what value to put in it using the profile
  data provided.

  Return ONLY a JSON object. No markdown, no explanation, no extra text.

# ── Field analysis prompt ───────────────────────────────────────────────
# Sent with each form's HTML. {profile} is replaced with key org facts.
# {form_html} is the inner/outer HTML of the form element.
analyze_form: |
  You are looking at a web form. Analyze every input, textarea, and select element.
  For each field, determine:
  1. What the field is asking for (name, email, company, sponsorship level, etc.)
  2. The best value to fill in from Seattle GiveCamp's profile.

  Seattle GiveCamp Profile:
  {profile}

  Form HTML:
  {form_html}

  Return a JSON object in this exact format:
  {{
    "fields": [
      {{
        "selector": "CSS selector or #id or [name='...'] for the field",
        "label": "human-readable label of what this field is",
        "field_type": "text|email|phone|select|textarea|checkbox|radio|file|hidden",
        "value": "the value to fill in",
        "confidence": 0.0-1.0
      }}
    ],
    "form_purpose": "sponsorship|partnership|donation|contact|general|none",
    "submit_selector": "CSS selector for the submit button (best guess)",
    "should_submit": true/false,
    "reasoning": "brief explanation of why you chose these values"
  }}

  Rules:
  - Match fields by label text, name attribute, placeholder, or surrounding context.
  - For "First Name" / "Last Name" fields: use "Mike" and "Roshak".
  - For "Organization" / "Company": use "Seattle GiveCamp".
  - For "Email": use "michael@seattlegivecamp.org".
  - For "Phone": use "(425) 405-0301".
  - For "Address" fields: use the mailing address from the profile.
  - For sponsorship/tier dropdowns: select "{default_tier}".
  - For "How did you hear about us": use "Web search".
  - For "Comments" / "Anything else": leave empty unless the profile has boilerplate.
  - Skip file upload fields unless attach_sponsorship_deck is true.
  - If the form requires a W-9 or tax document upload, set should_submit to false
    and note "requires_w9" in reasoning.
  - If you're unsure about a field, set confidence low (<0.5).
  - Use the most specific CSS selector you can derive from the HTML.

# ── Pre-submit validation prompt ────────────────────────────────────────
# Sent right before clicking submit, with the filled form summary.
validate_before_submit: |
  Review the following form submission before it's sent. The form has been filled
  with these values:

  {filled_fields_summary}

  Form purpose: {form_purpose}
  Company URL: {company_url}

  Return JSON:
  {{
    "ok_to_submit": true/false,
    "issues": ["list any problems found"],
    "suggestions": ["list any suggested changes"]
  }}

  Flag issues like:
  - Missing required fields that we should have filled
  - Values that don't match the expected format (e.g., email in phone field)
  - Anything that looks wrong or could get the submission rejected

# ── Form search prompt (for crawling pages to find sponsorship forms) ───
# Used when navigating a company's site to find the right form.
find_sponsorship_page: |
  You are browsing a company's website to find where to submit a sponsorship request.
  Below are links found on the current page. Select the most likely link(s) that
  could lead to a sponsorship, partnership, donation, community, or contact form/page.

  Current URL: {current_url}
  Page title: {page_title}

  Links on this page:
  {links_json}

  Return JSON:
  {{
    "best_link": "the single best URL to visit next (or null if none)",
    "candidates": ["list of promising URLs ranked by relevance"],
    "confidence": 0.0-1.0,
    "reasoning": "brief explanation"
  }}

  Prioritize links containing: sponsor, partnership, partner, donate, community,
  giving, support, contact, about, foundation.
