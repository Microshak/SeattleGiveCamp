mission:
  one_sentence: "To provide pro bono software development to Seattle-area non-profits."
  paragraph: >
    Seattle GiveCamp is a volunteer-led, registered 501(c)(3) nonprofit organization
    dedicated to providing pro bono software development and technology solutions to
    Seattle-area charities. By hosting high-impact, weekend-long hackathons, the
    organization brings together local software developers, designers, database
    administrators, and project managers to build websites, mobile apps, and custom
    database tools for nonprofits that lack dedicated tech budgets. Since 2011,
    Seattle GiveCamp has supported over 150 local organizations, transforming
    community goodwill into functional digital tools and delivering hundreds of
    thousands of dollars in professional technical services back into the regional
    nonprofit ecosystem.
  impact_statement: >
    Seattle GiveCamp bridges the tech equity gap by translating professional technical
    skills into operational capacity for community nonprofits. Local charities often
    face steep financial barriers when adopting new technologies, which diverts scarce
    resources away from their core missions. By mobilizing a localized network of tech
    professionals, Seattle GiveCamp solves this problem through concentrated weekend
    hackathons. Key Impact: 150+ Charities Empowered over a decade of consistent
    service. $500,000+ Injected Annually in pro bono developer, designer, and project
    management labor. 100% Retained Funding — every digital solution provided allows
    charities to keep funding focused on front-line services. Scalable Solutions
    include custom database architecture, mobile applications, and modernized web
    ecosystems.

